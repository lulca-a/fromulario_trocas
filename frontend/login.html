<!DOCTYPE html>

<html lang="pt-br">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Trocas CMI</title>

  <style>

    * {

      margin: 0;

      padding: 0;

      box-sizing: border-box;

      font-family: Arial, sans-serif;

    }

    body {

      height: 100vh;

      display: flex;

      align-items: center;

      justify-content: center;

      background-color: #f5f5f5;

      color: #333;

    }

    .container {

      background: white;

      padding: 40px;

      border-radius: 12px;

      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);

      width: 320px;

    }

    h1 {

      font-size: 18px;

      margin-bottom: 25px;

      text-align: center;

      letter-spacing: 1px;

    }

    input {

      width: 100%;

      padding: 10px;

      margin-bottom: 15px;

      border: 1px solid #ddd;

      border-radius: 6px;

      font-size: 14px;

      outline: none;

    }

    input:focus {

      border-color: #333;

    }

    button {

      width: 100%;

      padding: 10px;

      border: none;

      border-radius: 6px;

      background: #333;

      color: white;

      font-size: 14px;

      cursor: pointer;

      transition: 0.2s;

    }

    button:hover {

      background: #555;

    }

    .links {

      margin-top: 15px;

      display: flex;

      justify-content: space-between;

      font-size: 12px;

    }

    .links a {

      text-decoration: none;

      color: #666;

      transition: 0.2s;

    }

    .links a:hover {

      color: #000;

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>Formulário de Trocas</h1>

    <form>

      <input type="email" placeholder="Email" required />

      <input type="password" placeholder="Senha" required />

      <button type="submit">Entrar</button>

    </form>

    <div class="links">

      <a href="#">Esqueci minha senha</a>

      <a href="#">Criar conta</a>

    </div>

  </div>

</body>

</html>
