<!DOCTYPE html>

<html lang="pt-br">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Painel - Trocas CMI</title>

  <script src="app.js" defer></script>


  <style>

    * {

      margin: 0;

      padding: 0;

      box-sizing: border-box;

      font-family: Arial, sans-serif;

    }

    body {

      background-color: #f5f5f5;

      padding: 20px;

    }

    .topbar {

      display: flex;

      justify-content: flex-end;

      margin-bottom: 30px;

    }

    .logout {

      border: 1px solid #ccc;

      padding: 8px 14px;

      border-radius: 6px;

      cursor: pointer;

      background: transparent;

    }

    .container {

      max-width: 400px;

      margin: 0 auto;

      background: white;

      padding: 30px;

      border-radius: 12px;

      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);

    }

    h2 {

      margin-bottom: 20px;

      text-align: center;

    }

    label {

      font-size: 13px;

      margin-bottom: 5px;

      display: block;

    }

    select,

    input {

      width: 100%;

      padding: 10px;

      margin-bottom: 15px;

      border: 1px solid #ddd;

      border-radius: 6px;

    }

    .row {

      display: flex;

      gap: 10px;

    }

    .row div {

      flex: 1;

    }

    .submit-btn {

      width: 100%;

      padding: 12px;

      border: none;

      border-radius: 6px;

      background: #333;

      color: white;

      cursor: pointer;

    }

 

  footer {

    text-align: center;

    padding: 15px;

    font-size: 12px;

    color: #777;

  }

  </style>

</head>

<body>

  <div class="topbar">

    <button class="logout">Sair</button>

  </div>

  <div class="container">

    <h2>Registrar Troca</h2>

    <form>

      <label>Tipo de Escala</label>

      <select>

        <option>Escala CMI</option>

      </select>

        <div class="row">

        <div> <!--mes-->

          <label>Mês</label>

          <select>

            <option>Janeiro</option>

            <option>Fevereiro</option>

            <option>Março</option>

          </select>

        </div>

        <div><!--ano-->

          <label>Ano</label>

          <select>

            <option>2025</option>

            <option>2026</option>

          </select>

        </div>

      </div>

      <label>Solicitado por:</label>

      <select id="pessoa1">

        <option>João</option>

        <option>Maria</option>

        <option>Carlos</option>

        <option>Ana</option>

        <option>Lucas</option>

      </select>

      <div class="row">

        <div><!--dia1-->

          <label>Meu dia</label>

          <input id="dia1" type="text" placeholder="Ex: 24">

        </div>

        <div><!--turno1-->

          <label>Meu turno</label>

          <input id="turno1" type="text" placeholder="Ex: 1T">

        </div>

      </div>

      <label>Pessoa Referenciada</label>

      <select id="pessoa2">

        <option>João</option>

        <option>Maria</option>

        <option>Carlos</option>

      </select>

      <div class="row">

        <div><!--dia2-->

          <label>Dia da Pessoa</label>

          <input id="dia2" type="text" placeholder="Ex: 12">

        </div>

        <div><!--turno2-->

          <label>Turno da Pessoa</label>

          <input id="turno2" type="text" placeholder="Ex: 2T">

        </div>

      </div>

      <button id="botao" type="submit" class="submit-btn">Enviar</button>

    </form>

  </div>

  <footer>

    <p id ='foot'>made with joy</p>

  </footer>

</body>

</html>
